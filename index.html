
<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
--bg:#000;--text:#fff;--muted:#aaa;
--primary:#ff0000;--secondary:#AD4AE7;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

/* 🎥 BACKGROUND VIDEO */
.bg-video{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* overlay */
.overlay{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

body{
color:var(--text);
padding:20px;
}

.container{max-width:600px;margin:auto}

/* 🔥 PROFILE 16:9 */
.profile-wrapper{
width:100%;
aspect-ratio:16/9;
margin:0 auto 20px;
padding:5px;
border-radius:20px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 25px rgba(173,74,231,.5);
animation:glow 4s infinite alternate;
overflow:hidden;
position:relative;
}

.profile-wrapper video{
width:100%;
height:100%;
object-fit:cover;
border-radius:15px;
}

.profile-wrapper::after{
content:'';
position:absolute;
top:0;left:0;width:100%;height:100%;
background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
border-radius:15px;
}

@keyframes glow{
0%{box-shadow:0 0 15px var(--primary)}
100%{box-shadow:0 0 30px var(--secondary)}
}

/* HEADER */
.header{text-align:center;margin-bottom:25px}
.title{font-family:'Orbitron';font-size:26px;font-weight:800}
.subtitle{color:var(--muted)}

/* GRID */
.video-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.video-box{
aspect-ratio:1/1;
border-radius:15px;
overflow:hidden;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
position:relative;
cursor:pointer;
}

.video-box::before{
content:'';
position:absolute;
top:0;left:0;right:0;height:3px;
background:linear-gradient(90deg,var(--primary),var(--secondary))
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* play icon */
.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:50%;
opacity:0;
transition:.2s;
}

.video-box.paused .play-icon{
opacity:1;
}
</style>
</head>

<body>

<script>
// 🔒 KEY SYSTEM (ENCODE)
const SECRET = atob("QWxpZlJhbmkyMA==");

function checkKey(){
  const input = document.getElementById("keyInput").value;

  if(input === SECRET){
    document.getElementById("lockScreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Oops, wrong password!!";
  }
}

// 🎬 PLAY / PAUSE VIDEO
document.querySelectorAll(".video-box").forEach(box=>{
  const video = box.querySelector("video");

  box.addEventListener("click", ()=>{
    if(video.paused){
      video.play();
      box.classList.remove("paused");
    }else{
      video.pause();
      box.classList.add("paused");
    }
  });
});

// 🔊 BACKGROUND SOUND (aktif setelah klik)
document.body.addEventListener("click", ()=>{
  const bg = document.getElementById("bgVid");
  if(bg) bg.muted = false;
}, {once:true});

// ⌨️ ENTER = LANGSUNG LOGIN
document.getElementById("keyInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    checkKey();
  }
});

// ❌ DISABLE KLIK KANAN
document.addEventListener("contextmenu", e => e.preventDefault());

// ❌ DISABLE F12 (basic)
document.onkeydown = function(e){
  if(e.key === "F12"){
    return false;
  }
};
</script>
